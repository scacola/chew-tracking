name: ChewCoach
options:
  bundleIdPrefix: com.chewcoach
  deploymentTarget:
    iOS: '17.0'
  developmentLanguage: ko
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: '5.9'
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: ''
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: 'NO'
    CODE_SIGNING_ALLOWED: 'NO'
    ENABLE_USER_SCRIPT_SANDBOXING: 'YES'
targets:
  ChewCoach:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: ChewCoach
        excludes:
          - "Preview Content/**"
      - path: ChewCoach/Preview Content
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chewcoach.app
        GENERATE_INFOPLIST_FILE: 'YES'
        INFOPLIST_KEY_CFBundleDisplayName: Chew Coach
        INFOPLIST_KEY_UILaunchScreen_Generation: 'YES'
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSMotionUsageDescription: "AirPods 모션으로 식사 시작·끝을 자동으로 살펴봐요. 데이터는 기기 내에서만 처리됩니다."
        INFOPLIST_KEY_UIBackgroundModes: audio
        DEVELOPMENT_ASSET_PATHS: "\"ChewCoach/Preview Content\""
        ENABLE_PREVIEWS: 'YES'
        TARGETED_DEVICE_FAMILY: '1'
        ASSETCATALOG_COMPILER_APPICON_NAME: ''
  ChewCoachTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - ChewCoachTests
    dependencies:
      - target: ChewCoach
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chewcoach.app.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/ChewCoach.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ChewCoach
schemes:
  ChewCoach:
    build:
      targets:
        ChewCoach: all
        ChewCoachTests: [test]
    test:
      targets:
        - ChewCoachTests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
